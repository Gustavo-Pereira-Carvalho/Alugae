<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Anunciar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/anunciar.css">
</head>
<body>

<!-- HEADER -->
<header class="header-anunciar">
  <h1>Alugaê</h1>
</header>

<!-- CONTAINER -->
<div class="container-anunciar">

  <!-- FORM CARD -->
  <div class="form-box">
    <h2>Anunciar novo item</h2>

    <input id="nomeItem" placeholder="Nome do item">
    <input id="precoItem" placeholder="Preço por dia">
    <input id="cidadeItem" placeholder="Cidade">
    <input id="imagemItem" placeholder="URL da imagem">
    <input id="telefoneItem" placeholder="Telefone (DDD + número)">

    <!-- NOVO: SELECT CATEGORIA -->
    <select id="categoriaItem">
      <option value="">Selecione a categoria</option>
      <option value="Roupa">Roupa</option>
      <option value="Ferramentas">Ferramentas</option>
      <option value="Games">Games</option>
      <option value="Equipamentos">Equipamentos</option>
      <option value="Outros">Outros</option>
    </select>

    <button id="btnSalvar">Publicar</button>

    <a href="index.html" class="voltar">← Voltar</a>
  </div>

</div>

<!-- FOOTER -->
<footer>
  © 2026 Alugaê
</footer>

<script type="module" src="anunciar.js"></script>
</body>
</html>
