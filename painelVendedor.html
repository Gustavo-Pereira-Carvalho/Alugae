<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel do Vendedor</title>

  <link rel="stylesheet" href="style/painelVendedor.css">
</head>
<body>

<div class="container">

  <h1>💰 Meu painel</h1>

  <div class="cards">

    <div class="card">
      <h3>Saldo disponível</h3>
      <p id="saldo">R$0</p>
    </div>

    <div class="card">
      <h3>Total faturado</h3>
      <p id="total">R$0</p>
    </div>

    <div class="card">
      <h3>Pedidos aceitos</h3>
      <p id="pedidos">0</p>
    </div>

  </div>

  <button id="btnSaque">💸 Solicitar saque</button>

  <a href="index.html">← Voltar</a>

</div>

<script type="module" src="painelVendedor.js"></script>

</body>
</html>
