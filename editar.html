<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Editar Anúncio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style/anunciar.css">
  <link rel="stylesheet" href="style/header.css">
  <link rel="stylesheet" href="style/whatsapp.css">
</head>
<body>

<header class="header-global">
  <div class="header-container">
    <img src="img/ALUGAE.png" class="logo">
    <div class="header-actions" id="headerActions"></div>
  </div>
</header>

<div class="container-anunciar">
  <div class="form-box">
    <h2>Editar item</h2>

    <input id="nomeItem" placeholder="Nome do item">
    <input id="precoItem" type="number" placeholder="Preço por dia">

    <textarea id="descricaoItem" placeholder="Descrição do produto"></textarea>

    <input id="telefoneItem" placeholder="Telefone">
    <input id="imagemItem" placeholder="URL da imagem">

    <select id="categoriaItem">
      <option value="">Selecione a categoria</option>
      <option value="Roupa">Roupa</option>
      <option value="Ferramentas">Ferramentas</option>
      <option value="Games">Games</option>
      <option value="Equipamentos">Equipamentos</option>
      <option value="Outros">Outros</option>
    </select>

    <select id="entregaItem">
      <option value="">Entrega disponível?</option>
      <option value="true">Sim</option>
      <option value="false">Não</option>
    </select>

    <select id="tamanhoItem">
      <option value="">Tamanho do item</option>
      <option value="pequeno">Pequeno</option>
      <option value="medio">Médio</option>
      <option value="grande">Grande</option>
    </select>

    <button id="btnSalvar">Salvar alterações</button>

    <a href="meus-anuncios.html" class="voltar">← Voltar</a>
  </div>
</div>

<footer>
  © 2026 Alugaê
</footer>

<script type="module" src="editar.js"></script>
<script type="module" src="header.js"></script>

<script type="module">
  import { initWhatsAppButton } from "./components/whatsapp.js";
  initWhatsAppButton();
</script>

</body>
</html>
