<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style/style.css"/>
  <link rel="stylesheet" href="style/whatsapp.css">
  <title>Alugaê</title>
</head>

<body>

<!-- HEADER -->
<header class="header-global">
  <div class="header-container">

    <img src="img/ALUGAE.png" class="logo">

    <div class="nav">
      <button class="btn-nav">Explorar</button>
      <a href="meus-anuncios.html" class="btn-nav">Meus anúncios</a>
    </div>

    <div id="headerActions"></div>

  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h2>Alugue qualquer coisa</h2>
  <p>Ferramentas, eletrônicos, games e muito mais</p>

  <div class="search">
    <input class="pesquisa" placeholder="O que você quer alugar?">
    <button class="search-button">Buscar</button>
  </div>
</section>

<!-- MAIN -->
<main>

  <!-- DESTAQUES -->
  <div class="destaques">
    <div class="display">
      <h2>Destaques</h2>
    </div>

    <div class="display-destaque">

      <div class="card-destaque" data-categoria="Todos">
        <img src="https://cdn-icons-png.flaticon.com/256/1828/1828817.png">
        <p>Todos</p>
      </div>

      <div class="card-destaque" data-categoria="Roupa">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT4fIv9JFoRRFgzzuKBTy8FpMLytyKiL764jA&s">
        <p>Roupa</p>
      </div>

      <div class="card-destaque" data-categoria="Ferramentas">
        <img src="https://cdn-icons-png.flaticon.com/256/8248/8248093.png">
        <p>Ferramentas</p>
      </div>

      <div class="card-destaque" data-categoria="Games">
        <img src="https://images.emojiterra.com/google/android-11/512px/1f3ae.png">
        <p>Games</p>
      </div>

      <div class="card-destaque" data-categoria="Equipamentos">
        <img src="https://images.emojiterra.com/google/noto-emoji/unicode-17.0/color/svg/1f4f7.svg">
        <p>Equipamentos</p>
      </div>

      <div class="card-destaque" data-categoria="Outros">
        <img src="https://cdn-icons-png.flaticon.com/256/565/565547.png">
        <p>Outros</p>
      </div>

    </div>
  </div>

  <!-- ITENS -->
  <div class="itens">
    <div class="display">
      <h2>Alugue</h2>
    </div>

    <div class="display-itens"></div>
  </div>

<!-- ================= COMENTÁRIOS ================= -->
<section class="comentarios-section">
  <h2>Avaliações</h2>

  <!-- Formulário de envio -->
  <form class="comentario-form" id="comentarioForm">
    <input type="text" id="nomeUsuario" placeholder="Seu nome" required>

    <div class="estrelinhas-input">
      <label>Avaliação:</label>
      <div class="estrelinhas" id="estrelinhas">
        <span data-value="1">☆</span>
        <span data-value="2">☆</span>
        <span data-value="3">☆</span>
        <span data-value="4">☆</span>
        <span data-value="5">☆</span>
      </div>
    </div>

    <textarea id="mensagemUsuario" placeholder="Escreva seu comentário..." required></textarea>
    <button type="submit">Enviar avaliação</button>
  </form>

  <!-- Lista de comentários -->
  <div class="comentarios-list" id="comentariosList">
    <!-- Comentários serão adicionados via JS -->
  </div>
</section>

</main>

<footer>
  <div class="footer-container">
    <p class="copyright">© 2026 Alugaê. Todos os direitos reservados</p>
    <p class="contato">
      Instagram: 
      <a href="https://instagram.com/alugaeoficial_br" target="_blank">@alugaeoficial_br</a> | 
      Email: 
      <a href="mailto:alugaeoficial220@gmail.com">alugaeoficial220@gmail.com</a>
    </p>
  </div>
</footer>

<script type="module" src="script.js"></script>
<script type="module" src="header.js"></script>
<script type="module" src="comentarios.js"></script>

<script type="module">
  import { initWhatsAppButton } from "./components/whatsapp.js";
  initWhatsAppButton();
</script>

</body>
</html>
