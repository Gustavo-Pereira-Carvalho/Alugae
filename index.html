<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Alugaê</title>
</head>
<body>
    <header>
        <div class="display">
            <h1>Alugaê</h1>

            <div class="nav">
                <button class="btn-nav">Explorar</button>
                <button class="btn-nav">Como Funciona</button>
                <button class="btn-nav">Anunciar Item</button>
            </div>
            <div class="btn-header">
                <button class="btn-login">Login</button>
                <button class="btn-cad">Cadastrar</button>
            </div>
        </div>

        <h2>Alugue qualquer coisa <br> perto de você</h2>
        <p>Ferramentas, eletrônicos, carros e muito mais</p>

        <div class="search">
            <input class="pesquisa" placeholder="O que você quer alugar?">
            <button class="search-button">Buscar</button>
        </div>
        
        
    </header>


    <main>
        <div class="display">
            <h2>Destaques</h2>
            <p>Ver todos >></p>
            
        </div>
        <div class="destaques">

            <div class="display-destaque">

                <div class="card">
                    <img src="https://images.emojiterra.com/google/noto-emoji/unicode-17.0/color/svg/1f697.svg" alt="carro">
                    <p>veiculos</p>
                </div>

                <div class="card">
                    <img src="https://cdn-icons-png.flaticon.com/256/8248/8248093.png" alt="">
                    <p>Ferramentas</p>
                </div>

                <div class="card">
                    <img src="https://images.emojiterra.com/google/android-11/512px/1f3ae.png" alt="">
                    <p>Games</p>
                </div>

                <div class="card">
                    <img src="https://images.emojiterra.com/google/noto-emoji/unicode-17.0/color/svg/1f4f7.svg" alt="">
                    <p>Equipamentos</p>
                </div>
                
            </div>
        </div>
    </main>

    <footer>@ 2026 Alugaê. Todos os direitos reservados</footer>
</body>
</html>
