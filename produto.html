<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alugaê - Produto</title>
  <link rel="stylesheet" href="style/produto.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

<div class="container-produto">

  <div class="produto-box">
    <div>
      <img id="imagem" class="produto-img" src="" alt="Produto">
    </div>

    <div class="produto-info">
      <h1 id="nome">Produto</h1>
      <p id="descricao">Descrição do produto...</p>
      <h2 class="produto-preco" id="preco">R$0/dia</h2>

      <div class="dono">
        <img src="img/user.png" alt="Dono">
        <span id="nomeDono">Nome do dono</span>
      </div>

      <div class="opcoes-entrega">
        <label for="tipoEntrega">Escolha a entrega</label>
        <select id="tipoEntrega">
          <option value="retirar">Retirar no local</option>
          <option value="moto">Moto (R$20)</option>
          <option value="carro">Carro (R$50)</option>
        </select>
      </div>

      <div class="box-aluguel">
        <h3>Selecione as datas</h3>
        <input id="calendario" placeholder="Escolha o período" readonly>
        <p class="recomendacao">Datas já alugadas estão bloqueadas</p>
        <p class="total" id="total">Total: R$0</p>
        <div class="botoes-acoes">
          <button id="btnAlugar" class="btn-alugar">Alugar</button>
          <button id="btnWhats" class="btn-whatsapp">WhatsApp</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script type="module" src="produto.js"></script>
</body>
</html>
