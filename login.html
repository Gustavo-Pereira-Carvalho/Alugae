<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style/login.css">
</head>
<body>

<header class="header-login">
  <h1>Alugaê</h1>
</header>

<div class="container-login">
  <div class="login-box">

    <h2 id="titulo">Entrar</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <!-- só aparece no cadastro -->
    <input id="confirmarSenha" type="password" placeholder="Confirmar senha" style="display:none;">

    <button id="btnPrincipal">Entrar</button>

    <p id="toggleModo" style="margin-top:10px; cursor:pointer; color:#7b2cbf;">
      Não tem conta? Criar conta
    </p>

    <a href="index.html" class="voltar">← Voltar</a>

  </div>
</div>

<footer>© 2026 Alugaê</footer>

<script type="module" src="login.js"></script>

</body>
</html>
